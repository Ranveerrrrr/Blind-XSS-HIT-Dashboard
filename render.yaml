services:
  - type: web
    name: blind-xss-hit-dashboard
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PUBLIC_BASE_URL
        sync: false
      - key: DASHBOARD_USERNAME
        sync: false
      - key: DASHBOARD_PASSWORD
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: DATA_DIR
        value: /var/data
